name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run electron-rebuild -f -w better-sqlite3
      - run: bunx vite build
      - run: bunx vite build --config vite.main.config.ts
      - run: bunx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run electron-rebuild -f -w better-sqlite3
      - run: bunx vite build
      - run: bunx vite build --config vite.main.config.ts
      - run: bunx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    # Wait for both jobs, but only require the Mac build to succeed. If
    # Windows is broken we still publish the Mac assets — release is
    # incomplete but usable.
    needs: [build-mac, build-windows]
    if: ${{ !cancelled() && needs.build-mac.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo ${{ github.repository }} --draft=false

